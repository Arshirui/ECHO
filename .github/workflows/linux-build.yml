name: Linux build

on:
  workflow_dispatch:

jobs:
  linux-x64:
    name: Linux x64 AppImage
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Linux dependencies preparing finished by nix

      - name: Install Node dependencies
        run: nix develop --command npm ci

      # Prepare Linux ffmpeg finished by nix shellHook

      - name: Build Linux packages
        run: nix develop --command npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echo-next-linux-x64
          path: |
            dist/*.AppImage
            dist/linux-unpacked/resources/echo-audio-host
            dist/linux-unpacked/resources/tools/ffmpeg
          if-no-files-found: error
